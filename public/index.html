<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HACKER YT PRO 2026 - PHÁ NGUYÊN BẢN</title>
    <style>
        body {background:#000;color:#0f0;font-family:Courier New;text-align:center;padding:20px;}
        h1 {color:#f00;text-shadow:0 0 20px red;}
        input {width:90%;padding:15px;background:#111;border:3px solid #0f0;color:#0f0;font-size:16px;}
        button {padding:15px 40px;background:#f00;color:#fff;border:none;font-size:20px;margin:10px;cursor:pointer;}
        button:hover {background:#0f0;color:#000;}
        #result {margin:30px auto;max-width:900px;background:#111;padding:20px;border:2px solid #0f0;text-align:left;word-break:break-all;}
    </style>
</head>
<body>
    <h1>🔥 HACKER YT BACKEND - PHÁ YT MẸ NÓ NGUYÊN BẢN</h1>
    <input type="text" id="url" placeholder="Dán link YT vô đây thằng ngu... https://youtu.be/xxxx" style="width:85%"/>
    <br><br>
    <button onclick="hackInfo()">1. HACK INFO & FORMATS</button>
    <button onclick="taiBest()">2. TẢI BEST NGUYÊN BẢN (mp4 cao nhất)</button>
    
    <div id="result"></div>

    <script>
        const baseUrl = window.location.origin;   // tự lấy domain Render, không bị encode nữa

        async function hackInfo() {
            const link = document.getElementById('url').value.trim();
            const result = document.getElementById('result');
            if (!link) return result.innerHTML = '<p style="color:red">Đụ mày dán link YT vô trước đi con ngu!</p>';

            result.innerHTML = '<p style="color:yellow">Đang hack YouTube... chờ tao phá server mẹ nó...</p>';

            try {
                const res = await fetch(`\( {baseUrl}/hack-info?url= \){encodeURIComponent(link)}`);
                const data = await res.json();

                let html = `<h2>✅ ${data.title || 'Không biết tên'}</h2>`;
                if (data.formats && data.formats.length) {
                    data.formats.forEach(f => {
                        html += `<p>▶ ${f.resolution} - \( {f.filesize}MB <a href=" \){f.url}" target="_blank" style="color:#0ff">TẢI NGUYÊN BẢN</a></p>`;
                    });
                } else {
                    html += '<p>Không ra format, thử nút TẢI BEST đi.</p>';
                }
                result.innerHTML = html;
            } catch(e) {
                result.innerHTML = `<p style="color:orange">Hack fail vl: ${e.message || e}<br>Rep tao "link die" nếu cần cookie.</p>`;
            }
        }

        function taiBest() {
            const link = document.getElementById('url').value.trim();
            if (!link) return alert("Đụ mày dán link vô trước!");
            window.open(`\( {baseUrl}/download?url= \){encodeURIComponent(link)}`, '_blank');
        }

        // Nhấn Enter hack luôn
        document.getElementById('url').addEventListener('keypress', e => {
            if (e.key === 'Enter') hackInfo();
        });
    </script>
</body>
</html>
